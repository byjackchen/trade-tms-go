# tms local stack.
#
# Host ports reserved for this project (this machine runs other stacks —
# never change these to defaults): postgres 55432, redis 56379,
# api 18080, ui 13000.
#
# Base services (no profile): postgres, redis, migrate.
#   docker compose up -d --wait        # brings up DB + cache, runs migrations
#
# App services use the `app` profile as their build phases land
# (all app + live services active):
#   docker compose --profile app up -d

name: tms

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: tmsgo-postgres
    environment:
      POSTGRES_USER: ${TMS_PG_USER:-tms}
      POSTGRES_PASSWORD: ${TMS_PG_PASSWORD:-tms}
      POSTGRES_DB: ${TMS_PG_DATABASE:-tms}
    ports:
      - "55432:5432"
    volumes:
      - tmsgo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TMS_PG_USER:-tms} -d ${TMS_PG_DATABASE:-tms}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tmsgo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "56379:6379"
    volumes:
      - tmsgo-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    image: tms:dev
    container_name: tmsgo-migrate
    command: ["migrate", "up"]
    environment:
      TMS_PG_HOST: postgres
      TMS_PG_PORT: "5432"
      TMS_PG_USER: ${TMS_PG_USER:-tms}
      TMS_PG_PASSWORD: ${TMS_PG_PASSWORD:-tms}
      TMS_PG_DATABASE: ${TMS_PG_DATABASE:-tms}
      TMS_PG_SSLMODE: disable
      TMS_LOG_LEVEL: ${TMS_LOG_LEVEL:-info}
      TMS_LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ---------------------------------------------------------------------
  # Placeholders — enabled in later build phases (profile: app).
  # Reserved host ports: api 18080, ui 13000.
  #
  # container_name is global per Docker host. The Python reference stack
  # (trade-multi-strategies) already runs containers literally named
  # `tms-api` and `tms-ui` on this machine, so the app-profile services
  # use the `tmsgo-` prefix to never collide with the reference stack.
  # ---------------------------------------------------------------------

  # UI-facing HTTP + WebSocket API (P1; contract: docs/api.md). REST for data
  # coverage/freshness/gaps, ticker search, dataset-sync history, job
  # enqueue/inspect/cancel and universe snapshots, plus a WebSocket fan-out of
  # job/sync events bridged from Redis pub/sub. Start with:
  #   docker compose --profile app up -d --wait tmsgo-api
  #
  # Every /api/* route requires the TMS_API_TOKEN bearer token; /healthz and
  # /version are public. env_file pulls TMS_API_TOKEN (and any other secrets)
  # from .env — the API refuses to start without it. The explicit environment
  # block overrides .env's host-oriented values (in-network postgres:5432 /
  # redis:6379) and sets the container-internal listen addr.
  #
  # Healthcheck: the runtime image is distroless (no shell), so the check execs
  # the binary itself — `tms api --health` GETs the server's own loopback
  # /healthz (probe and server share the container netns) and exits 0/1.
  tmsgo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: tms:dev
    container_name: tmsgo-api
    profiles: ["app"]
    command: ["api"]
    ports:
      - "18080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      TMS_PG_HOST: postgres
      TMS_PG_PORT: "5432"
      TMS_PG_USER: ${TMS_PG_USER:-tms}
      TMS_PG_PASSWORD: ${TMS_PG_PASSWORD:-tms}
      TMS_PG_DATABASE: ${TMS_PG_DATABASE:-tms}
      TMS_PG_SSLMODE: disable
      TMS_REDIS_ADDR: redis:6379
      TMS_API_ADDR: ":8080"
      TMS_API_CORS_ORIGINS: ${TMS_API_CORS_ORIGINS:-http://localhost:13000,http://127.0.0.1:13000}
      TMS_LOG_LEVEL: ${TMS_LOG_LEVEL:-info}
      TMS_LOG_FORMAT: json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/tms", "api", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Background job worker (P1): durable tms.jobs queue — FOR UPDATE SKIP
  # LOCKED claiming, heartbeats + stale-claim recovery, cooperative cancel,
  # per-job panic isolation, graceful drain on SIGTERM. Start with:
  #   docker compose --profile app up -d --wait tmsgo-worker
  #
  # Healthcheck: the runtime image is distroless (no shell, so no
  # `test -f` health file), therefore the check execs the binary itself —
  # `tms worker --health` GETs the worker's loopback /healthz endpoint
  # (TMS_WORKER_HEALTH_ADDR; probe and server share the container netns)
  # and exits 0/1.
  #
  # env_file pulls secrets (NASDAQ key, ...) from .env when present; the
  # explicit environment block overrides .env's host-oriented values
  # (127.0.0.1:55432 → in-network postgres:5432, etc.).
  #
  # The Sharadar parquet cache is mounted read-only at /data/sharadar for
  # 'data.refresh' source=parquet backfills; point TMS_SHARADAR_CACHE_DIR
  # (in .env) at the cache root produced by the Python reference, else the
  # default ./cache/sharadar is used (auto-created empty if absent).
  tmsgo-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: tms:dev
    container_name: tmsgo-worker
    profiles: ["app"]
    command: ["worker"]
    env_file:
      - path: .env
        required: false
    environment:
      TMS_PG_HOST: postgres
      TMS_PG_PORT: "5432"
      TMS_PG_USER: ${TMS_PG_USER:-tms}
      TMS_PG_PASSWORD: ${TMS_PG_PASSWORD:-tms}
      TMS_PG_DATABASE: ${TMS_PG_DATABASE:-tms}
      TMS_PG_SSLMODE: disable
      TMS_REDIS_ADDR: redis:6379
      TMS_WORKER_CONCURRENCY: ${TMS_WORKER_CONCURRENCY:-4}
      TMS_WORKER_HEALTH_ADDR: 127.0.0.1:8081
      TMS_SHARADAR_CACHE_DIR: /data/sharadar
      TMS_RUNS_DIR: /data/runs
      TMS_LOG_LEVEL: ${TMS_LOG_LEVEL:-info}
      TMS_LOG_FORMAT: json
    volumes:
      - ${TMS_SHARADAR_CACHE_DIR:-./cache/sharadar}:/data/sharadar:ro
      # legacy backtest artifacts (runs/{ts}/*.json) written alongside the DB
      # source of truth (backtest.run) — read-write, shared with the API.
      - ${TMS_RUNS_DIR:-./runs}:/data/runs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/tms", "worker", "--health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Live trading node (P5): the SAME internal/core engine + strategy / portfolio
  # / warmup code as backtest, driven by a wall clock and a streaming moomoo
  # OpenD bar feed. In signal mode it records a SignalIntent per strategy per bar
  # (tms.signal_intents + Redis streams) and submits NO orders (paper/live
  # deferred to P6). Under the `live` profile (NOT `app`) so it never starts by
  # accident — a trading node is started deliberately:
  #   docker compose --profile live up -d tmsgo-live
  #
  # OpenD switch (TMS_MOOMOO_ADDR, P5 decision 2):
  #   - GATE / CI:  point at the in-repo mock OpenD (protocol-faithful, driven
  #                 from our Postgres bars). Set TMS_MOOMOO_ADDR=<mock-host>:<port>.
  #   - REAL OpenD: TMS_MOOMOO_ADDR=host.docker.internal:11111 (OpenD runs on the
  #                 host; extra_hosts maps host.docker.internal to the gateway).
  #                 The real-OpenD smoke is DEFERRED to market hours with a
  #                 user-confirmed OpenD login — see docs/runbooks/live-smoke.md.
  #
  # Secrets: moomoo credentials (if any) are read from a secrets FILE
  # (/run/secrets/moomoo, mounted from ./secrets/moomoo.env) — NEVER baked into
  # the image and NEVER logged. For market-data + signal mode on localhost OpenD,
  # no credentials are required (encrypt=off); the file is optional.
  #
  # Healthcheck: the distroless image execs `tms live --health`, which GETs the
  # node's own loopback /healthz (TMS_WORKER_HEALTH_ADDR, shared netns) and exits
  # 0/1. The node also exposes that endpoint on host port 18090.
  tmsgo-live:
    build:
      context: .
      dockerfile: Dockerfile
    image: tms:dev
    container_name: tmsgo-live
    profiles: ["live"]
    # Default strategy is sector_rotation: it derives its ETF universe entirely
    # from params and needs NO --tickers, so the shipped default runs a working
    # signal session on a fresh stack regardless of whether a stock universe has
    # been loaded yet. (SEPA / multi DO need stocks; the runner now resolves a
    # default SF1 universe when --tickers is empty, but that universe is empty on
    # a stack with no bars — so the safe shipped default avoids SEPA.) Override
    # via TMS_LIVE_STRATEGY (+ pass --tickers for sepa/multi) when bars are loaded.
    # TMS_LIVE_MODE selects the execution mode: signal (default; no orders) |
    # paper (SIMULATE broker account) | live (REAL money — requires the full
    # activation gate: real acc id + TMS_LIVE_CONFIRM phrase + the
    # TMS-LIVE-REAL-001 trader id, all from ./secrets/moomoo.env; the node
    # refuses live without them). Paper/live also need the mock or real OpenD
    # trading venue on TMS_MOOMOO_ADDR.
    command:
      - "live"
      - "--mode"
      - "${TMS_LIVE_MODE:-signal}"
      - "--strategy"
      - "${TMS_LIVE_STRATEGY:-sector_rotation}"
      - "--trader-id"
      - "${TMS_LIVE_TRADER_ID:-SIGNAL-001}"
    ports:
      - "18090:18090"
    env_file:
      - path: .env
        required: false
      # moomoo credentials (optional; localhost market-data needs none). Never
      # baked into the image — sourced from a gitignored secrets file at runtime.
      - path: ./secrets/moomoo.env
        required: false
    environment:
      TMS_PG_HOST: postgres
      TMS_PG_PORT: "5432"
      TMS_PG_USER: ${TMS_PG_USER:-tms}
      TMS_PG_PASSWORD: ${TMS_PG_PASSWORD:-tms}
      TMS_PG_DATABASE: ${TMS_PG_DATABASE:-tms}
      TMS_PG_SSLMODE: disable
      TMS_REDIS_ADDR: redis:6379
      # The real-vs-mock OpenD switch. Default targets real host OpenD; override
      # to the mock address in the gate / CI.
      TMS_MOOMOO_ADDR: ${TMS_MOOMOO_ADDR:-host.docker.internal:11111}
      TMS_LIVE_TRADER_ID: ${TMS_LIVE_TRADER_ID:-SIGNAL-001}
      TMS_WORKER_HEALTH_ADDR: 0.0.0.0:18090
      TMS_LOG_LEVEL: ${TMS_LOG_LEVEL:-info}
      TMS_LOG_FORMAT: json
      # Paper/live trading config (P6). The broker account ids + the live
      # activation phrase + unlock password are SECRETS — set them ONLY in
      # ./secrets/moomoo.env (gitignored, env_file above), never here / in .env.
      # Defaulted empty so a signal-mode stack needs none; paper/live REQUIRE the
      # corresponding values and the node refuses to start without them.
      TMS_MOOMOO_PAPER_ACC_ID: ${TMS_MOOMOO_PAPER_ACC_ID:-}
      TMS_MOOMOO_LIVE_ACC_ID: ${TMS_MOOMOO_LIVE_ACC_ID:-}
      TMS_RECONCILE_INTERVAL: ${TMS_RECONCILE_INTERVAL:-5m}
    extra_hosts:
      # Reach the host's OpenD (127.0.0.1:11111 on the host) from inside the
      # container as host.docker.internal:11111 (real-OpenD path).
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/tms", "live", "--health", "--health-addr", "127.0.0.1:18090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Next.js control-plane UI (P1). Server-side renders the Data workspace
  # (coverage / freshness / gap heatmap / sync history) and server-side proxies
  # every API call so the TMS_API_TOKEN bearer token NEVER reaches the browser
  # (injected by the UI's /api/proxy/* and /api/stream SSE routes). Start with:
  #   docker compose --profile app up -d --wait ui
  #
  # The image is a multi-stage Next.js standalone bundle running as a non-root
  # user (ui/Dockerfile). env_file pulls TMS_API_TOKEN from .env (must equal the
  # API's token); the explicit environment block points the UI at the API over
  # the compose network (tmsgo-api:8080) and overrides the host-oriented default.
  #
  # Healthcheck: hits the UI's own /api/healthz (always 200 when the process
  # serves HTTP), execed via node fetch inside the container netns.
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    image: tms-ui:dev
    container_name: tmsgo-ui
    profiles: ["app"]
    ports:
      - "13000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      TMS_API_URL: http://tmsgo-api:8080
      # TMS_API_TOKEN comes from .env (same value as the API). The proxy returns
      # 500 "ui server is not configured" if it is missing.
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    depends_on:
      tmsgo-api:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  tmsgo-pgdata:
  tmsgo-redisdata:
